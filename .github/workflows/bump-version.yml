name: Bump Version

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Bump type (or exact version like 1.2.3)"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Calculate new version
        id: version
        run: |
          current=$(grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          IFS='.' read -r major minor patch <<< "$current"

          case "${{ inputs.bump }}" in
            major) new="$((major + 1)).0.0" ;;
            minor) new="${major}.$((minor + 1)).0" ;;
            patch) new="${major}.${minor}.$((patch + 1))" ;;
          esac

          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "new=$new" >> "$GITHUB_OUTPUT"
          echo "Bumping $current -> $new"

      - name: Update pyproject.toml
        run: sed -i 's/^version = ".*"/version = "${{ steps.version.outputs.new }}"/' pyproject.toml

      - name: Update blender_manifest.toml
        run: sed -i 's/^version = ".*"/version = "${{ steps.version.outputs.new }}"/' src/blender_cli/addon/blender_manifest.toml

      - name: Commit, tag, and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml src/blender_cli/addon/blender_manifest.toml
          git commit -m "Bump version to v${{ steps.version.outputs.new }}"
          git tag "v${{ steps.version.outputs.new }}"
          git push origin main --tags
