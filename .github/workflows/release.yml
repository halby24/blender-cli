name: Release Addon

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create addon zip
        run: |
          cd src/blender_cli/addon
          zip -r "$GITHUB_WORKSPACE/blender_cli-${GITHUB_REF_NAME}.zip" .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: blender_cli-*.zip
          generate_release_notes: true
